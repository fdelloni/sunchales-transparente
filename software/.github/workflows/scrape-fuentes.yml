# Workflow del scraper diario de fuentes municipales.
# Cron 09:00 UTC = 06:00 ART. Manual disponible vía workflow_dispatch.
name: Scrape fuentes municipales (diario)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      solo:
        description: "Correr solo un scraper (vacio = todos)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "publicaciones-concejo"
          - "licitaciones"
          - "digesto-concejo"
          - "remuneraciones"
          - "digesto-oficial"
          - "verificar-brechas-auditoria"

permissions:
  contents: write

concurrency:
  group: scrape-fuentes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrapear publicaciones del Concejo
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'publicaciones-concejo'
        run: npm run scrapear-publicaciones-concejo

      - name: Scrapear licitaciones
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'licitaciones'
        run: npm run scrapear-licitaciones

      - name: Scrapear digesto del Concejo
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'digesto-concejo'
        run: npm run scrapear-digesto-concejo

      - name: Scrapear remuneraciones
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'remuneraciones'
        run: npm run scrapear-remuneraciones

      - name: Sincronizar digesto oficial del Municipio
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'digesto-oficial'
        run: npm run sincronizar-digesto

      - name: Verificar brechas auditadas
        if: github.event.inputs.solo == '' || github.event.inputs.solo == 'verificar-brechas-auditoria'
        run: npm run verificar-brechas-auditoria
        continue-on-error: true

      - name: Detectar cambios
        id: cambios
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
          else
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          fi

      - name: Commit y push
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "src/lib/data/*.generated.ts" "data/digesto-oficial/items_completos.json" "data/digesto-oficial/detalles" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios staged"
            exit 0
          fi
          FECHA=$(date -u +"%Y-%m-%d")
          git commit -m "chore(scrape): actualizacion automatica ${FECHA}"
          git push origin HEAD:main
