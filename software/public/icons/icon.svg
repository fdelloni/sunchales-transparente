<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sunchales Transparente — Ícono PWA principal.
       Compone los dos colores de la Bandera oficial de Sunchales
       (Ord. 1762/2007): oro (cielo iluminado de la colonización
       definitiva) y verde (llanura típica). Sobre ese fondo, una
       "S" estilizada en verde forestal profundo que evoca tanto
       a "Sunchales" como a la idea de "ver a través" (transparencia
       como apertura). El ícono está diseñado para verse bien tanto
       a 16px (favicon) como a 512px (splash screen Android). -->

  <!-- Fondo dividido horizontal: oro arriba, verde abajo -->
  <rect x="0" y="0" width="512" height="256" fill="#FCC81D"/>
  <rect x="0" y="256" width="512" height="256" fill="#ADCF3D"/>

  <!-- Círculo central blanco que da contraste y aire alrededor de la "S" -->
  <circle cx="256" cy="256" r="170" fill="#FFFFFF" opacity="0.95"/>

  <!-- "S" institucional en verde forestal profundo (color navy del sitio) -->
  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="280"
    font-weight="bold"
    fill="#0F5E1F"
    style="letter-spacing: -8px;"
  >S</text>

  <!-- Acento dorado oscuro debajo de la S, como subrayado institucional -->
  <rect x="180" y="370" width="152" height="10" rx="5" fill="#9A7400"/>
</svg>
