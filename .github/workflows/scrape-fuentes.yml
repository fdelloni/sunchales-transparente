name: Scrape fuentes municipales (diario)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      solo:
        description: "Correr solo un scraper (default = todos)"
        required: false
        default: "todos"
        type: choice
        options:
          - "todos"
          - "publicaciones-concejo"
          - "licitaciones"
          - "digesto-concejo"
          - "remuneraciones"
          - "digesto-oficial"
          - "verificar-brechas-auditoria"

permissions:
  contents: write

concurrency:
  group: scrape-fuentes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: software
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: software/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scrapear publicaciones del Concejo
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'publicaciones-concejo' || github.event_name == 'schedule'
        run: npm run scrapear-publicaciones-concejo

      - name: Scrapear licitaciones
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'licitaciones' || github.event_name == 'schedule'
        run: npm run scrapear-licitaciones

      - name: Scrapear digesto del Concejo
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'digesto-concejo' || github.event_name == 'schedule'
        run: npm run scrapear-digesto-concejo

      - name: Scrapear remuneraciones
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'remuneraciones' || github.event_name == 'schedule'
        run: npm run scrapear-remuneraciones

      - name: Sincronizar digesto oficial del Municipio
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'digesto-oficial' || github.event_name == 'schedule'
        run: npm run sincronizar-digesto

      - name: Verificar brechas auditadas
        if: github.event.inputs.solo == 'todos' || github.event.inputs.solo == 'verificar-brechas-auditoria' || github.event_name == 'schedule'
        run: npm run verificar-brechas-auditoria
        continue-on-error: true

      - name: Detectar cambios
        id: cambios
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
          else
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          fi

      - name: Commit y push (con rebase para evitar race con otros workflows)
        if: steps.cambios.outputs.hay_cambios == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "software/src/lib/data/*.generated.ts" \
                  "software/data/digesto-oficial/items_completos.json" \
                  "software/data/digesto-oficial/detalles" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios staged"
            exit 0
          fi
          FECHA=$(date -u +"%Y-%m-%d")
          git commit -m "chore(scrape): actualizacion automatica ${FECHA}"
          # Reintentar push hasta 5 veces con rebase, porque descargar-pdfs-concejo.yml
          # corre en paralelo (mismo cron 09:00 UTC) y puede pushear primero. Sin
          # rebase, git push falla con "non-fast-forward" — la causa del 90% de los
          # runs rojos hasta el 2026-05-17.
          for INTENTO in 1 2 3 4 5; do
            echo "Push intento $INTENTO/5..."
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Intento $INTENTO falló (probable push concurrente); esperando 10s..."
            sleep 10
          done
          echo "ERROR: push falló tras 5 reintentos con rebase"
          exit 1
